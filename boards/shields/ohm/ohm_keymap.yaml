  - [HASH, STAR, COLON, FSLH, '', '?', PIPE, '-', MINUS, ⌫]
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - both
    - {type: held}
    - PP
    - {t: ▽, type: trans}
  both:
  - - {t: ▽, type: trans}
    - F1
    - F2
    - F3
    - F4
    - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - {t: BT, h: '2'}
    - {t: BT, h: '3'}
    - BT CLR
  - - LGUI
    - LALT
    - LSHFT
    - RALT
    - F8
    - {t: ▽, type: trans}
    - VOL DN
    - MUTE
    - VOL UP
    - RGUI
  - - 'ZMK'
    - F9
    - F10
    - F11
    - F12
    - {t: ▽, type: trans}
    - PREV
    - PP
    - NEXT
    - 'ZMK'
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
    - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
