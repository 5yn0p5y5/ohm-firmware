layout: {zmk_keyboard: ohm, layout_name: physical_layout0}
layers:
  base:
  - [Q, W, E, R, T, Y, U, I, O, P]
  - [A, S, D, F, G, H, J, K, L, SEMICOLON]
  - [Z, X, C, V, B, N, M, COMMA, DOT, SQT]
  - [LSHFT, LCTRL, left, right, SPACE, RCTRL]
  left:
  - ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0']
  - [ESC, LALT, LSHFT, RALT, ENTER, PRINTSCREEN, LEFT, DOWN, UP, RIGHT]
